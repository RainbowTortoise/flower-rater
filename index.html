<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Quicksand:400,700">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
            animation: gradient 15s ease infinite;
            background: linear-gradient(to right, #ff7eb3, #ff758c, #ff6a88, #ff6159, #ff4f81);
            height: 100vh;
            color: white;
        }
        @keyframes gradient {
            0% {
                background: linear-gradient(-45deg, #ff7eb3, #ff758c, #ff6a88);
            }
            25% {
                background: linear-gradient(-45deg, #ff6a88, #ff4f81, #ff6159);
            }
            50% {
                background: linear-gradient(-45deg, #ff4f81, #ff7eb3, #ff758c);
            }
            75% {
                background: linear-gradient(-45deg, #ff758c, #ff6a88, #ff7eb3);
            }
            100% {
                background: linear-gradient(-45deg, #ff7eb3, #ff758c, #ff6a88);
            }
        }
        .flower-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px;
        }
        .flower-box {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            margin: 15px;
            padding: 10px;
            text-align: center;
            transition: transform 0.3s;
        }
        .flower-box:hover {
            transform: scale(1.05);
        }
        img {
            border-radius: 15px;
            width: 150px;
            height: 150px;
        }
        .emoji-buttons {
            display: flex;
            justify-content: center;
            margin: 20px;
        }
        .emoji {
            font-size: 30px;
            cursor: pointer;
            margin: 0 10px;
        }
        .progress-counter {
            text-align: center;
            font-size: 20px;
            margin-top: 20px;
        }
        .summary {
            display: none;
            text-align: center;
            margin-top: 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
        }
    </style>
    <title>Flower Rater</title>
</head>
<body>
    <h1>Rate Your Flowers!</h1>
    <div class="flower-container" id="flowerContainer">
        <!-- Flower boxes will be dynamically generated here -->
    </div>
    <div class="emoji-buttons">
        <span class="emoji" id="likeBtn">💖</span>
        <span class="emoji" id="dislikeBtn">💔</span>
    </div>
    <div class="progress-counter" id="progressCounter">
        Progress: <span id="counter">0</span>/300+
    </div>
    <div class="summary" id="summary">
        <h2>Summary</h2>
        <p id="summaryContent"></p>
        <button onclick="copySummary()">Copy Summary</button>
    </div>
    <script>
        const flowers = ['Rose', 'Tulip', 'Sunflower', 'Daisy', /* Include 300+ flower names here */];
        let currentIndex = 0;
        let likedFlowers = [];
        let dislikedFlowers = [];

        function displayFlowers() {
            const container = document.getElementById('flowerContainer');
            flowers.forEach((flower, index) => {
                const flowerBox = document.createElement('div');
                flowerBox.className = 'flower-box';
                flowerBox.innerHTML = `<img src='path_to_${flower}.jpg' alt='${flower}' /><p>${flower}</p>`;
                container.appendChild(flowerBox);
            });
        }

        function likeFlower() {
            likedFlowers.push(flowers[currentIndex]);
            moveToNextSlide();
        }

        function dislikeFlower() {
            dislikedFlowers.push(flowers[currentIndex]);
            moveToNextSlide();
        }

        function moveToNextSlide() {
            currentIndex++;
            document.getElementById('counter').innerText = currentIndex;
            if (currentIndex >= flowers.length) {
                showSummary();
            }
        }

        function showSummary() {
            document.getElementById('summary').style.display = 'block';
            const summaryContent = `Liked: ${likedFlowers.join(', ')}\nDisliked: ${dislikedFlowers.join(', ')}`;
            document.getElementById('summaryContent').innerText = summaryContent;
        }

        function copySummary() {
            const summary = document.getElementById('summaryContent').innerText;
            navigator.clipboard.writeText(summary);
            alert('Summary copied to clipboard!');
        }

        document.getElementById('likeBtn').onclick = likeFlower;
        document.getElementById('dislikeBtn').onclick = dislikeFlower;
        displayFlowers();
    </script>
</body>
</html>
