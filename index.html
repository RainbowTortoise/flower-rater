<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Rater</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f4;
        }
        img {
            max-width: 90%;
            height: auto;
            border-radius: 8px;
        }
        .rating {
            display: flex;
            justify-content: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Rate Your Flower</h1>
    <img src="https://source.unsplash.com/random/800x600/?flower" alt="Random Flower" id="flowerImage">
    <div class="rating">
        <button id="likeButton">Like</button>
        <button id="dislikeButton">Dislike</button>
    </div>
    <script>
        document.addEventListener('keydown', function(event) {
            if (event.key === "ArrowRight") {
                document.getElementById('likeButton').click();
            } else if (event.key === "ArrowLeft") {
                document.getElementById('dislikeButton').click();
            }
        });
    </script>
</body>
</html>
