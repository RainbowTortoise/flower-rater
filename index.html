<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Rater</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            margin: 0;
            padding: 0;
            animation: gradient 15s ease infinite;
            background: linear-gradient(45deg, pink, coral, red, orange);
            background-size: 400% 400%;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            padding: 20px;
        }
        .info {
            flex: 1;
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            margin-right: 20px;
        }
        .flower-image {
            flex: 1;
            text-align: center;
        }
        .flower-image img {
            border-radius: 20px;
            max-width: 90%;
            height: auto;
        }
        .emoji-buttons {
            text-align: center;
            margin-top: 20px;
        }
        .progress-counter {
            text-align: center;
            margin-top: 20px;
        }
        .summary {
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="info">
            <h1>Flower Rating App</h1>
            <h2 id="flower-name">Flower Name</h2>
            <p id="flower-info">Information about the flower will go here.</p>
            <div class="emoji-buttons">
                <button onclick="rateFlower('like')">👍 Like</button>
                <button onclick="rateFlower('dislike')">👎 Dislike</button>
            </div>
            <div class="progress-counter">
                <p id="progress-count">Flower 1 of 300+</p>
            </div>
        </div>
        <div class="flower-image">
            <img id="flower-pic" src="" alt="Flower">
            <p id="flower-name-below">Flower Name Below</p>
        </div>
    </div>
    <div class="summary">
        <h2>Summary of Ratings</h2>
        <div id="summary-content">Liked/Disliked flowers and their details will show here after rating.</div>
    </div>
    <script>
        let currentFlower = 0;
        let likedFlowers = [];
        let dislikedFlowers = [];

        function rateFlower(rating) {
            if (rating === 'like') {
                likedFlowers.push(currentFlower);
            } else {
                dislikedFlowers.push(currentFlower);
            }
            currentFlower++;
            updateProgress();
            if (currentFlower >= 300) {
                showSummary();
            } else {
                loadFlower(currentFlower);
            }
        }

        function updateProgress() {
            document.getElementById('progress-count').textContent = `Flower ${currentFlower + 1} of 300+`;
        }

        function showSummary() {
            document.querySelector('.summary').style.display = 'block';
            document.querySelector('.container').style.display = 'none';
            // Populate summary content with liked and disliked flowers information
        }

        function loadFlower(index) {
            // Load flower data based on index
            // Placeholder data for demonstration
            document.getElementById('flower-name').textContent = `Flower ${index + 1}`;
            document.getElementById('flower-info').textContent = `Information about Flower ${index + 1}`;
            document.getElementById('flower-pic').src = `flowers/flower${index + 1}.jpg`;
            document.getElementById('flower-name-below').textContent = `Flower ${index + 1}`;
        }

        document.addEventListener('keydown', function(event) {
            if (event.key === 'ArrowRight') {
                rateFlower('like');
            } else if (event.key === 'ArrowLeft') {
                rateFlower('dislike');
            }
        });

        loadFlower(currentFlower);
    </script>
</body>
</html>
