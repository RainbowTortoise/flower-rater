<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower Rater</title>
    <style>
        body {
            background: linear-gradient(to right, #fbc2eb, #a6c1ee);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
        }
        .flower-image {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 20px;
        }
        .button {
            background-color: transparent;
            border: none;
            cursor: pointer;
            font-size: 24px;
        }
        .progress-counter {
            margin: 20px 0;
        }
    </style>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300&display=swap" rel="stylesheet">
</head>
<body>
    <div class="card">
        <img src="path_to_flower_image.jpg" alt="Flower Image" class="flower-image">
        <h1>Flower Rater</h1>
        <p>This application allows you to rate flowers from our database of 300+ flowers with complete information.</p>
        <div class="progress-counter">Rated Flowers: <span id="counter">0</span></div>
        <button class="button" id="like-btn">👍 Like</button>
        <button class="button" id="dislike-btn">👎 Dislike</button>
        <div id="summary" style="display:none;">
            <h2>Summary</h2>
            <p>Here are the flowers you rated:</p>
            <!-- Summary information to be dynamically populated -->
            <button onclick="copyToClipboard()">Copy Summary</button>
        </div>
    </div>
    <script>
        // JavaScript for handling ratings, flower navigation, and summary display
        let ratedCount = 0;
        const counterElement = document.getElementById('counter');
        const summaryElement = document.getElementById('summary');

        document.getElementById('like-btn').onclick = function() {
            ratedCount++;
            counterElement.textContent = ratedCount;
            checkSummaryDisplay();
        };

        document.getElementById('dislike-btn').onclick = function() {
            ratedCount++;
            counterElement.textContent = ratedCount;
            checkSummaryDisplay();
        };

        function checkSummaryDisplay() {
            if (ratedCount >= 10) { // Change this number based on conditions
                summaryElement.style.display = 'block';
            }
        }

        function copyToClipboard() {
            // Function to copy summary to clipboard
            const summaryText = 'Your summary text here';
            navigator.clipboard.writeText(summaryText).then(() => {
                alert('Summary copied to clipboard!');
            });
        }
    </script>
</body>
</html>
